function renderPanel(p, i) {
  const panel = document.createElement("div");
  panel.className = "webtoon-panel";
  if (i < PANELS.length - 1 && p.gap) panel.style.marginBottom = p.gap + "px";
  const img = new Image();
  img.loading = "lazy";
  img.decoding = "async";
  img.alt = p.alt;
  img.src = p.src;
  img.onerror = () => {
    const ph = document.createElement("div");
    ph.className = "missing";
    ph.textContent = "⚠ 패널 이미지 누락: " + p.src;
    img.replaceWith(ph);
  };
  panel.appendChild(img);
  return panel;
}

(function init() {
  const strip = document.getElementById("strip");
  PANELS.forEach((p, i) => strip.appendChild(renderPanel(p, i)));
  document.getElementById("foot").innerHTML =
    "총 " + PANELS.length + " 패널 · 끝까지 스크롤하세요<br><br><b>END EP.01</b>";
